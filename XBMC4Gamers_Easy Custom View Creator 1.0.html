.app{}
header{gap:10px}
header label{color:var(--dim);font-size:12px}header input[type=number]{width:56px}header select{width:auto;padding:4px 6px}

.btn.accent:hover{box-shadow:0 0 16px rgba(155,240,11,.45)}

::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#28351f;border-radius:6px}::-webkit-scrollbar-thumb:hover{background:var(--accent-dk)}

.chip input[type=checkbox],header input[type=checkbox]{appearance:none;-webkit-appearance:none;width:32px!important;height:17px;min-width:32px;border-radius:9px;background:#2b333d;border:1px solid var(--edge);position:relative;cursor:pointer;transition:.15s;flex:none;padding:0}
.chip input[type=checkbox]:checked,header input[type=checkbox]:checked{background:var(--good);border-color:var(--good)}

.chip input[type=checkbox]:checked::after,header input[type=checkbox]:checked::after{left:17px}
.chip:has(input:checked){color:var(--ink)}
.catlbl{font-size:10px;color:var(--dim);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--edge);padding-bottom:3px}
.wm{position:absolute;inset:0;pointer-events:none;overflow:hidden;display:flex;align-items:center;justify-content:center;z-index:3}
.wm span{color:rgba(255,255,255,.16);font-weight:800;letter-spacing:1px;text-transform:uppercase;transform:rotate(-20deg);text-shadow:0 1px 1px rgba(0,0,0,.25);white-space:nowrap;max-width:96%;overflow:hidden}

 let x0,y0,x1,y1;
 if(side==='left'){x0=0;y0=0;x1=W;y1=0;}       // opaco a sx -> trasparente verso destra (interno)
 if(side==='right'){x0=W;y0=0;x1=0;y1=0;}      // opaco a dx

 {t:"Artwork del gioco",b:"Sono le immagini che <b>fornisce il gioco stesso</b>, quindi cambiano da gioco a gioco. Tu decidi solo dove metterle e quanto grandi:<br><br><b>Poster</b>: la copertina.<br><b>CD</b>: il disco.<br><b>CD Poster</b>: copertina con disco.<br><b>Open Case</b>: la custodia aperta.<br><b>Icon</b>: l'icona/custodia.<br><b>Banner</b>: la striscia orizzontale col titolo.<br><b>Thumb</b>: una miniatura.<br><b>Synopsis</b>: l'immagine della scheda.<br><b>Dual3D</b>: la custodia in 3D.<br><b>Fanart Thumb</b>: la fanart in piccolo.<br><b>Screenshot</b>: una foto del gioco in azione.<br><br>Non devi caricarle tu: le prende il gioco dalla sua cartella <i>_resources</i>."},
 {t:"Description (la trama)",b:"Il riquadro con la <b>descrizione del gioco</b>. Puoi scrivere o incollare un testo di esempio per vedere quanto ne entra nel riquadro e se è leggibile. Nel file finale il testo verrà preso automaticamente dal gioco."},
 {t:"Label (scritta libera)",b:"Una scritta a tua scelta. Può essere un <b>testo fisso</b> (es. \"I MIEI GIOCHI\") oppure un <b>valore che cambia</b> in base al gioco selezionato (anno, genere, voto, numero di giocatori, quante volte l'hai giocato...)."},
 {t:"Items counter",b:"Mostra <b>quanti giochi ci sono</b> nella cartella in cui ti trovi (es. \"120 Items\"). La parola \"Items\" la puoi cambiare o togliere."},
 {t:"Orario",b:"Mostra l'<b>ora corrente</b> (es. \"12:00\"), come un orologio in un angolo dello schermo."}]},

{t:"Le opzioni della Game List",b:"Quando selezioni la griglia dei giochi, a destra compaiono queste sezioni.",
 subs:[
 {t:"Comportamento della griglia",b:"Decide <b>chi si muove</b> quando scorri i giochi.<br><br><b>Navigazione libera</b>: ti sposti tu tra le copertine e va in focus quella che evidenzi; la griglia resta ferma.<br><b>Focus fisso</b>: la selezione resta sempre nella posizione scelta (Focus position) e sono le copertine a scorrere, esattamente come nella view predefinita di XBMC4Gamers.<br><br>In pratica sceglie da solo il tipo di contenitore giusto (panel o fixedlist), non devi pensarci."},
 {t:"Tipo lista",b:"<b>panel</b>: le copertine riempiono lo spazio e vanno a capo su più righe/colonne (è quello che si usa quasi sempre).<br><b>fixedlist</b>: la selezione resta ferma in un punto e scorrono le copertine.<br><b>list</b>: una sola fila.<br><b>wraplist</b>: fila continua che gira su sé stessa, come una giostra."},
 {t:"Orientamento",b:"Decide <b>da che parte scorrono</b> i giochi.<br><br><b>orizzontale</b>: scorri con destra/sinistra. In questo caso, per uscire dalla griglia e aprire le <b>opzioni di visualizzazione</b> premi <b>SU</b>.<br><b>verticale</b>: scorri con su/giù. In questo caso le opzioni si aprono premendo <b>SINISTRA</b>.<br><br>Il programma imposta da solo questa scorciatoia: non devi fare niente."},
 {t:"Larghezza / Altezza cover",b:"Quanto è grande la \"casella\" di ogni gioco. Più la fai piccola, più giochi entrano nello schermo."},
 {t:"Distanziamento cover (itemgap)",b:"Lo <b>spazio vuoto tra una copertina e l'altra</b>. Mettilo a 0 se le vuoi attaccate, aumentalo se le vuoi più arieggiate."},
 {t:"Visibili: X col × Y righe",b:"Non è un'opzione, è un'<b>informazione</b>: il programma ti dice quante copertine si vedranno, in base alle dimensioni che hai scelto."},
 {t:"Focus position",b:"In quale <b>posizione della fila</b> resta il gioco selezionato. Con 0 la selezione sta all'inizio; con 3 sta alla quarta casella, e le copertine gli scorrono intorno. È anche la casella che vedi evidenziata in arancione nell'anteprima."},
 {t:"Zoom on focus + Entità zoom",b:"Se attivo, la copertina selezionata <b>si ingrandisce</b>. Con lo slider decidi di quanto (in percentuale). 0% = non si ingrandisce; 20‑25% è il valore tipico. Attiva \"focus reale\" in alto per vederlo nell'anteprima."},
 {t:"Cover / icona",b:"Posizione e dimensione della <b>copertina dentro la sua casella</b>. Serve per centrarla o lasciare spazio sotto per il titolo. È indipendente dal titolo: puoi spostare uno senza toccare l'altro."},
 {t:"Titoli cover",b:"Il <b>nome del gioco</b> scritto sotto (o sopra, dove vuoi) la copertina.<br><br>Ci sono <b>due impostazioni separate</b>:<br>• <b>Titolo (normale)</b>: come appare sui giochi NON selezionati.<br>• <b>Titolo (on‑focus)</b>: come appare sul gioco selezionato.<br><br>Così puoi, ad esempio, farlo più grande e più in basso solo quando ci sei sopra. Di ognuno scegli posizione, dimensione, carattere, colore, allineamento, grassetto e maiuscolo."},
 {t:"Immagini on‑focus",b:"Immagini che compaiono <b>solo sul gioco selezionato</b>: tipicamente una cornice lucida attorno alla copertina.<br><br>Puoi aggiungerne quante vuoi. Le coordinate sono riferite alla casella del gioco, quindi valori negativi la fanno sporgere fuori (è normale per le cornici). Anche queste immagini finiscono nel pacchetto ZIP."},
 {t:"Testo scorrevole (titoli)",b:"Se il nome del gioco è più lungo del suo riquadro, con questa opzione <b>scorre da solo</b> come una scritta a scorrimento. Puoi attivarlo o disattivarlo <b>separatamente</b> per il titolo normale e per quello on-focus, e lo vedi scorrere anche nell&#39;anteprima."},
 {t:"Sfumature bordi",b:"Servono a far <b>dissolvere gradualmente</b> le icone quando raggiungono un bordo della griglia, invece di tagliarle di netto.<br><br>Attivi i lati che vuoi (<b>sinistra, destra, alto, basso</b>) con il rispettivo interruttore. Per ogni lato scegli lo <b>spessore</b> (quanto è larga la fascia), la <b>sfumatura</b> (quanto è morbida la dissolvenza) e il <b>colore</b> (di solito nero, o il colore del tuo sfondo). Il tool genera da solo l&#39;immagine di dissolvenza e la mette nel pacchetto; se preferisci puoi <b>caricare una tua immagine</b> al suo posto."},
 {t:"Navigazione",b:"Dice cosa succede premendo i tasti direzionali quando esci dalla griglia. Il programma li imposta da solo in base all'orientamento; toccali solo se sai cosa stai facendo. Il valore <b>9000</b> è il menù delle opzioni di visualizzazione."}]},

{t:"Le opzioni comuni a tutti gli oggetti",b:"",
 subs:[
 {t:"Nome oggetto",b:"Solo un'etichetta per riconoscerlo nell'elenco dei livelli. Non ha effetto sul risultato."},
 {t:"X, Y, W, H",b:"<b>X</b> = distanza da sinistra. <b>Y</b> = distanza dall'alto. <b>W</b> = larghezza. <b>H</b> = altezza. Sono in pixel, su uno schermo di 1280×720. Puoi anche modificarli trascinando col mouse."},
 {t:"Immagine anteprima",b:"Carica un'immagine tua <b>solo per vedere l'ingombro</b> nell'anteprima. Per gli artwork del gioco è solo un esempio (il gioco metterà la sua). Per gli oggetti <i>Image</i> invece diventa l'immagine vera che userai."},
 {t:"Aspect ratio",b:"Come l'immagine riempie il riquadro.<br><b>stretch</b>: la deforma per riempire tutto.<br><b>keep</b>: mantiene le proporzioni (può lasciare bordi vuoti). È quello giusto per le copertine.<br><b>scale</b>: riempie tutto tagliando ciò che esce."},
 {t:"Bordo",b:"Serve per le <b>cornici</b>: dice al programma di non deformare gli angoli dell'immagine quando la allarghi. Se non usi cornici, lascialo a 0."},
 {t:"Opacità",b:"Quanto è <b>trasparente</b> l'immagine, da 0% (invisibile) a 100% (piena). Utile per i pannelli di sfondo: abbassala per far vedere la fanart sotto."},
 {t:"Font",b:"Il <b>carattere</b> del testo. Sono quelli veri di XBMC4Gamers: il numero indica la grandezza (size_13 è piccolo, size_50 è enorme). Non inventarne altri o il testo non si vedrà."},
 {t:"Colore / grassetto / MAIUSCOLO",b:"Aspetto del testo. \"MAIUSCOLO\" trasforma tutto in lettere grandi, anche se il nome del gioco è scritto normale."},
 {t:"Autoscroll",b:"Solo per la descrizione: se il testo è più lungo del riquadro, <b>scorre da solo</b> dopo qualche secondo."},
 {t:"Avanti / Indietro / Elimina",b:"<b>Avanti</b> porta l'oggetto sopra agli altri, <b>Indietro</b> lo mette dietro. Serve quando due oggetti si sovrappongono (es. una scritta che deve stare sopra un pannello)."}]},

{t:"Livelli (z‑order)",b:"È l'elenco degli oggetti, dall'alto verso il basso. Chi sta <b>in alto nell'elenco</b> viene disegnato <b>sopra</b> gli altri.<br><br>Con le frecce ▲▼ sposti l'oggetto avanti o indietro, con ✕ lo elimini. Cliccando il nome lo selezioni.<br><br><b>Regola pratica</b>: la fanart e i pannelli di sfondo devono stare in fondo (dietro), le scritte e la griglia davanti."},

{t:"Salvare il lavoro",b:"",
 subs:[
 {t:"Copia",b:"Copia il testo dell'XML negli appunti, se vuoi incollarlo a mano da qualche parte."},
 {t:".xml",b:"Scarica il <b>solo file XML</b> della view."},
 {t:"Anteprima",b:"Salva una <b>fotografia</b> della tua schermata (immagine piccola in JPG), quella che XBMC4Gamers mostra per far vedere com'è fatta la view."},
 {t:"Pacchetto (consigliato)",b:"Scarica <b>tutto insieme</b> in un file ZIP. Aprendolo trovi:<br>• il file <b>.xml</b> della view<br>• l'immagine <b>.jpg</b> di anteprima<br>• una <b>cartella</b> con le tue immagini personalizzate<br><br>È già organizzato come si aspetta l'Xbox: ti basta copiare il contenuto nella cartella <i>custom views</i> dello skin."}]},

{t:"Consigli e problemi comuni",b:"",
 subs:[
 {t:"Non vedo la fanart",b:"Controlla di aver aggiunto l'oggetto <b>Fanart</b> e che nelle opzioni della dashboard la fanart sia attiva. Ricorda anche che se metti un pannello di sfondo opaco davanti, la copre: abbassa l'opacità del pannello."},
 {t:"Le copertine sono troppo attaccate o troppo poche",b:"Regola <b>Larghezza/Altezza cover</b> e il <b>Distanziamento (itemgap)</b>. L'indicatore \"Visibili: X col × Y righe\" ti dice subito il risultato."},
 {t:"Il titolo si sovrappone alla copertina",b:"Sposta il titolo (sezione Titoli cover) oppure rimpicciolisci la copertina nella sezione <b>Cover / icona</b>. Sono indipendenti."},
 {t:"Le mie immagini non si vedono sull'Xbox",b:"Devono stare nella cartella con lo <b>stesso nome del file XML</b>, dentro <i>custom views</i>. Se scarichi il <b>Pacchetto</b> è già tutto al posto giusto."},
 {t:"Il testo non si vede",b:"Quasi sempre è il <b>font</b> sbagliato o il colore uguale allo sfondo. Usa solo i font dell'elenco."}]}
]},

en:{title:"Easy Custom View Creator Guide",intro:"This guide explains, in plain words, what every single option of the Easy Custom View Creator does. No programming knowledge needed: just read the part you care about.",
secs:[
{t:"What this tool is",b:"It lets you <b>build a custom screen</b> (a <i>custom view</i>) for XBMC4Gamers: the way your games look on the Xbox screen.<br><br>You build it by dragging things with the mouse, and the tool writes the XML file for you. No coding required.",
 subs:[
 {t:"The three areas",b:"<b>Left</b>: objects you can add, and the layer list.<br><b>Centre</b>: the preview, i.e. how the screen will really look (1280×720).<br><b>Right</b>: options of the selected object and the generated XML."},
 {t:"How to work",b:"1) Click an object in the palette.<br>2) Drag it in the preview to move it.<br>3) Pull the blue corners to resize it.<br>4) Fine‑tune everything on the right.<br>5) Press <b>Package</b> to download everything."}]},

{t:"The top bar",b:"General settings of the screen you are creating.",
 subs:[
 {t:"View ID",b:"The <b>ID number</b> of your screen (80 to 99). Each custom view needs a different number. It goes into the file name (e.g. <i>CustomViewtype_id_85.xml</i>) and inside the file. If unsure, leave 85."},
 {t:"scroll‑fade",b:"When on, everything else <b>fades slightly</b> while the game list scrolls. Purely cosmetic."},
 {t:"real focus",b:"Normally every cover in the preview is shown in its \"not selected\" state, so you see the look of the row. Turning this on makes <b>only</b> the cover at <b>Focus position</b> switch to the real selected state: it zooms and shows its frame and its on‑focus title. This lets you judge the final result before trying it on the Xbox."},
 {t:"grid",b:"Shows a <b>grid overlay</b> to help you align things by eye. It never ends up in the file."},
 {t:"snap 5px",b:"Objects move in 5‑pixel steps, so things line up neatly. Turn it off for pixel‑precise moves."},
 {t:"Language and Wiki",b:"The dropdown changes the language of the whole tool. The Wiki button opens this guide."},
 {t:"Save / Load",b:"<b>Save</b> writes a project file (.json) with all your work so you can continue later. <b>Load</b> reopens it. This file does NOT go on the Xbox."}]},

{t:"Objects you can add",b:"These are the building blocks. Each one appears in the preview with a sample image so you can see how much room it takes. Sample images are for you only: they never end up in the final file.",
 subs:[
 {t:"Game List (the grid)",b:"The <b>most important</b> object: the list of your game covers. You choose how big the covers are, how many are visible, how they scroll, and what happens to the selected one."},
 {t:"Fanart",b:"The <b>full‑screen background</b> of the selected game. It is special: it cannot be moved or resized, because it always fills the screen.<br><br>It uses the official fanart include, so it <b>obeys the dashboard options</b>: remove fanart, animate it, blur it, and so on. Remove it and those options stop working on your view."},
 {t:"Image / Panel (your own images)",b:"For <b>your own images</b>: panels, backgrounds, frames, decorations (e.g. the classic <i>recentaddedback.png</i>).<br><br>When you load a file, its name becomes the object name and the texture path in the XML. These images are also saved into the ZIP package."},
 {t:"Game artwork",b:"Images <b>provided by the game itself</b>, so they change per game. You only choose where and how big:<br><br><b>Poster</b>: the cover.<br><b>CD</b>: the disc.<br><b>CD Poster</b>: cover with disc.<br><b>Open Case</b>: opened case.<br><b>Icon</b>: icon/case.<br><b>Banner</b>: horizontal title strip.<br><b>Thumb</b>: a thumbnail.<br><b>Synopsis</b>: the info sheet image.<br><b>Dual3D</b>: 3D case.<br><b>Fanart Thumb</b>: small fanart.<br><b>Screenshot</b>: in‑game photo.<br><br>You don't upload these: the game supplies them from its <i>_resources</i> folder."},
 {t:"Description",b:"The box with the <b>game story</b>. You can type or paste sample text to check how much fits and whether it is readable. In the final file the text is taken from the game automatically."},
 {t:"Label",b:"Any text you want. Either a <b>fixed text</b> (e.g. \"MY GAMES\") or a <b>changing value</b> from the selected game (year, genre, rating, players, times played...)."},
 {t:"Items counter",b:"Shows <b>how many games</b> are in the current folder (e.g. \"120 Items\"). The word \"Items\" can be changed or removed."},
 {t:"Clock",b:"Shows the <b>current time</b> (e.g. \"12:00\")."}]},

{t:"Game List options",b:"These sections appear when you select the game grid.",
 subs:[
 {t:"Grid behaviour",b:"Decides <b>who moves</b> when you scroll.<br><br><b>Free navigation</b>: you move across the covers and the highlighted one gets focus; the grid stays still.<br><b>Fixed focus</b>: the selection always stays at the chosen Focus position and the covers scroll instead, exactly like the default XBMC4Gamers view.<br><br>It picks the right container for you (panel or fixedlist)."},
 {t:"List type",b:"<b>panel</b>: covers fill the space and wrap onto more rows/columns (the usual choice).<br><b>fixedlist</b>: the selection stays put and covers scroll past it.<br><b>list</b>: a single row.<br><b>wraplist</b>: a continuous carousel."},
 {t:"Orientation",b:"Which way the games <b>scroll</b>.<br><br><b>horizontal</b>: left/right. To leave the grid and open the <b>view options</b> you press <b>UP</b>.<br><b>vertical</b>: up/down. Then the options open by pressing <b>LEFT</b>.<br><br>The tool sets this shortcut automatically."},
 {t:"Cover width / height",b:"The size of each game's cell. Smaller cells = more games on screen."},
 {t:"Cover spacing (itemgap)",b:"The <b>empty gap between covers</b>. 0 = touching; increase for more breathing room."},
 {t:"Visible: X cols × Y rows",b:"Not an option, just <b>information</b>: how many covers will be visible with your current sizes."},
 {t:"Focus position",b:"Where in the row the <b>selected</b> game sits. 0 = at the start; 3 = fourth cell, with covers scrolling around it. It is the cell highlighted orange in the preview."},
 {t:"Zoom on focus + Zoom amount",b:"The selected cover <b>grows</b>. The slider sets by how much (percent). 0% = no growth; 20‑25% is typical. Turn on \"real focus\" to see it in the preview."},
 {t:"Cover / icon",b:"Position and size of the <b>cover inside its cell</b>. Use it to centre it or leave room for the title. It is independent from the title."},
 {t:"Cover titles",b:"The <b>game name</b> under (or wherever) the cover.<br><br>There are <b>two separate settings</b>:<br>• <b>Title (normal)</b>: on NOT selected games.<br>• <b>Title (on‑focus)</b>: on the selected game.<br><br>So you can make it bigger and lower only when highlighted. For each: position, size, font, colour, alignment, bold, uppercase."},
 {t:"On‑focus images",b:"Images shown <b>only on the selected game</b>: typically a glossy frame around the cover.<br><br>Coordinates are relative to the game's cell, so negative values make it stick out (normal for frames). These images are included in the ZIP package too."},
 {t:"Scrolling text (titles)",b:"If the game name is longer than its box, this makes it <b>scroll by itself</b> like a marquee. You can toggle it <b>separately</b> for the normal title and the on-focus one, and you see it scroll in the preview too."},
 {t:"Edge fades",b:"They make the icons <b>fade out gradually</b> when they reach a grid edge, instead of being cut off.<br><br>Enable the sides you want (<b>left, right, top, bottom</b>) with each toggle. For every side you set the <b>thickness</b>, the <b>softness</b> and the <b>colour</b> (usually black, or your background colour). The tool builds the fade image for you and puts it in the package; you can also <b>upload your own image</b> instead."},
 {t:"Navigation",b:"What the D‑pad does when you leave the grid. The tool sets it from the orientation; change it only if you know what you are doing. <b>9000</b> is the view options menu."}]},

{t:"Options shared by all objects",b:"",
 subs:[
 {t:"Object name",b:"Just a label to recognise it in the layer list. No effect on the result."},
 {t:"X, Y, W, H",b:"<b>X</b> = distance from the left. <b>Y</b> = from the top. <b>W</b> = width. <b>H</b> = height. In pixels, on a 1280×720 screen. Dragging with the mouse changes them too."},
 {t:"Preview image",b:"Load an image <b>just to see the footprint</b>. For game artwork it is only an example (the game provides the real one). For <i>Image</i> objects it becomes the actual image you will use."},
 {t:"Aspect ratio",b:"<b>stretch</b>: distorts to fill.<br><b>keep</b>: keeps proportions (may leave empty edges). Right choice for covers.<br><b>scale</b>: fills everything, cropping the excess."},
 {t:"Border",b:"For <b>frames</b>: stops the corners from stretching when the image is enlarged. Leave 0 if you don't use frames."},
 {t:"Opacity",b:"How <b>transparent</b> the image is, 0% to 100%. Handy for background panels: lower it to let the fanart show through."},
 {t:"Font",b:"The <b>typeface</b>. These are the real XBMC4Gamers fonts: the number is the size (size_13 small, size_50 huge). Don't invent names or the text won't show."},
 {t:"Colour / bold / UPPERCASE",b:"Text appearance. \"UPPERCASE\" forces capital letters even if the game name is not."},
 {t:"Autoscroll",b:"Description only: if the text is longer than the box, it <b>scrolls by itself</b> after a few seconds."},
 {t:"Forward / Back / Delete",b:"<b>Forward</b> brings the object above the others, <b>Back</b> pushes it behind. Useful when objects overlap."}]},

{t:"Layers (z‑order)",b:"The list of objects, top to bottom. Whatever is <b>higher in the list</b> is drawn <b>on top</b>.<br><br>▲▼ move it forward/back, ✕ deletes it, clicking the name selects it.<br><br><b>Rule of thumb</b>: fanart and background panels at the bottom, text and the grid on top."},

{t:"Saving your work",b:"",
 subs:[
 {t:"Copy",b:"Copies the XML text to the clipboard."},
 {t:".xml",b:"Downloads <b>only the XML file</b>."},
 {t:"Preview",b:"Saves a small JPG <b>snapshot</b> of your screen, the one XBMC4Gamers shows to preview the view."},
 {t:"Package (recommended)",b:"Downloads <b>everything</b> in one ZIP. Inside you find:<br>• the view <b>.xml</b><br>• the preview <b>.jpg</b><br>• a <b>folder</b> with your custom images<br><br>Already arranged the way the Xbox expects: copy the contents into the skin's <i>custom views</i> folder."}]},

{t:"Tips and common problems",b:"",
 subs:[
 {t:"I can't see the fanart",b:"Make sure you added the <b>Fanart</b> object and that fanart is enabled in the dashboard options. Also, an opaque background panel in front will hide it: lower the panel's opacity."},
 {t:"Covers too close / too few",b:"Adjust <b>cover width/height</b> and the <b>spacing (itemgap)</b>. The \"Visible: X cols × Y rows\" line shows the result instantly."},
 {t:"The title overlaps the cover",b:"Move the title (Cover titles) or shrink the cover in <b>Cover / icon</b>. They are independent."},
 {t:"My images don't show on the Xbox",b:"They must sit in a folder with the <b>same name as the XML file</b>, inside <i>custom views</i>. The <b>Package</b> download already does this."},
 {t:"Text is invisible",b:"Almost always a wrong <b>font</b> name or a colour identical to the background. Use only fonts from the list."}]}
]},

es:{title:"Guía del Easy Custom View Creator",intro:"Esta guía explica, con palabras sencillas, para qué sirve cada opción del Easy Custom View Creator. No hace falta saber programar: lee solo la parte que te interese.",
secs:[
{t:"Qué es esta herramienta",b:"Sirve para <b>crear una pantalla personalizada</b> (una <i>custom view</i>) para XBMC4Gamers: cómo se ven tus juegos en la pantalla de la Xbox.<br><br>La construyes arrastrando elementos con el ratón y la herramienta escribe sola el archivo XML. No hay que programar.",
 subs:[
 {t:"Las tres zonas",b:"<b>Izquierda</b>: objetos que puedes añadir y la lista de capas.<br><b>Centro</b>: la vista previa, es decir cómo se verá de verdad (1280×720).<br><b>Derecha</b>: opciones del objeto seleccionado y el XML generado."},
 {t:"Cómo se trabaja",b:"1) Haz clic en un objeto de la paleta.<br>2) Arrástralo en la vista previa para moverlo.<br>3) Tira de las esquinas azules para redimensionarlo.<br>4) Ajusta los detalles a la derecha.<br>5) Pulsa <b>Paquete</b> para descargarlo todo."}]},

{t:"La barra superior",b:"Ajustes generales de la pantalla que estás creando.",
 subs:[
 {t:"View ID",b:"El <b>número identificativo</b> de tu pantalla (80 a 99). Cada custom view necesita un número distinto. Aparece en el nombre del archivo (p.ej. <i>CustomViewtype_id_85.xml</i>) y dentro de él. Si dudas, deja 85."},
 {t:"scroll‑fade",b:"Si está activo, todo lo demás se <b>atenúa ligeramente</b> mientras desplazas la lista. Es solo estético."},
 {t:"foco real",b:"Normalmente todas las carátulas se muestran en estado \"no seleccionado\". Al activarlo, <b>solo</b> la carátula en <b>Focus position</b> pasa al estado real de selección: se amplía y muestra su marco y su título on‑focus. Así ves el resultado final antes de probarlo en la Xbox."},
 {t:"rejilla",b:"Muestra una <b>cuadrícula</b> para ayudarte a alinear. Nunca acaba en el archivo."},
 {t:"snap 5px",b:"Los objetos se mueven de 5 en 5 píxeles, para alinear con orden. Desactívalo para mover píxel a píxel."},
 {t:"Idioma y Wiki",b:"El desplegable cambia el idioma de toda la herramienta. El botón Wiki abre esta guía."},
 {t:"Guardar / Cargar",b:"<b>Guardar</b> crea un archivo de proyecto (.json) con tu trabajo para seguir otro día. <b>Cargar</b> lo reabre. Ese archivo NO va a la Xbox."}]},

{t:"Objetos que puedes añadir",b:"Son las piezas de la pantalla. Cada uno aparece en la vista previa con una imagen de ejemplo, para que veas cuánto ocupa. Las imágenes de ejemplo son solo para ti: nunca acaban en el archivo final.",
 subs:[
 {t:"Game List (la rejilla)",b:"El objeto <b>más importante</b>: la lista con las carátulas. Eliges el tamaño de las carátulas, cuántas se ven, cómo se desplazan y qué le pasa a la seleccionada."},
 {t:"Fanart",b:"El <b>fondo a pantalla completa</b> del juego seleccionado. Es especial: no se mueve ni se redimensiona.<br><br>Usa el fanart oficial, así que <b>obedece a las opciones</b> del dashboard: quitar fanart, animarlo, desenfocarlo, etc. Si lo quitas, esas opciones dejan de funcionar en tu vista."},
 {t:"Image / Panel (tus imágenes)",b:"Para <b>tus propias imágenes</b>: paneles, fondos, marcos, adornos (por ejemplo el clásico <i>recentaddedback.png</i>).<br><br>Al cargar un archivo, su nombre pasa a ser el nombre del objeto y la ruta en el XML. Estas imágenes también se guardan en el ZIP."},
 {t:"Arte del juego",b:"Imágenes que <b>aporta el propio juego</b>, así que cambian según el juego. Tú solo eliges dónde y de qué tamaño:<br><br><b>Poster</b>: la carátula.<br><b>CD</b>: el disco.<br><b>CD Poster</b>: carátula con disco.<br><b>Open Case</b>: caja abierta.<br><b>Icon</b>: icono/caja.<br><b>Banner</b>: tira horizontal con el título.<br><b>Thumb</b>: miniatura.<br><b>Synopsis</b>: imagen de la ficha.<br><b>Dual3D</b>: caja en 3D.<br><b>Fanart Thumb</b>: fanart pequeño.<br><b>Screenshot</b>: captura del juego.<br><br>No las subes tú: las pone el juego desde su carpeta <i>_resources</i>."},
 {t:"Description (la sinopsis)",b:"El recuadro con la <b>descripción del juego</b>. Puedes escribir o pegar un texto de ejemplo para ver cuánto cabe y si se lee bien. En el archivo final el texto lo pone el juego."},
 {t:"Label (texto libre)",b:"Un texto a tu elección. Puede ser <b>fijo</b> (p.ej. \"MIS JUEGOS\") o un <b>valor variable</b> del juego seleccionado (año, género, nota, jugadores, veces jugado...)."},
 {t:"Items counter",b:"Muestra <b>cuántos juegos hay</b> en la carpeta actual (p.ej. \"120 Items\"). La palabra \"Items\" se puede cambiar o quitar."},
 {t:"Reloj",b:"Muestra la <b>hora actual</b> (p.ej. \"12:00\")."}]},

{t:"Opciones de la Game List",b:"Aparecen al seleccionar la rejilla de juegos.",
 subs:[
 {t:"Comportamiento de la rejilla",b:"Decide <b>quién se mueve</b> al desplazar.<br><br><b>Navegación libre</b>: te mueves tú entre las carátulas y la resaltada recibe el foco; la rejilla queda fija.<br><b>Foco fijo</b>: la selección se queda siempre en la Focus position y se desplazan las carátulas, como en la vista por defecto de XBMC4Gamers.<br><br>Elige por ti el contenedor adecuado (panel o fixedlist)."},
 {t:"Tipo de lista",b:"<b>panel</b>: las carátulas llenan el espacio y saltan a más filas/columnas (lo habitual).<br><b>fixedlist</b>: la selección se queda fija y las carátulas pasan.<br><b>list</b>: una sola fila.<br><b>wraplist</b>: carrusel continuo."},
 {t:"Orientación",b:"Hacia dónde <b>se desplazan</b> los juegos.<br><br><b>horizontal</b>: izquierda/derecha. Para salir de la rejilla y abrir las <b>opciones de vista</b> pulsas <b>ARRIBA</b>.<br><b>vertical</b>: arriba/abajo. Entonces las opciones se abren con <b>IZQUIERDA</b>.<br><br>La herramienta configura este atajo sola."},
 {t:"Ancho / alto de carátula",b:"El tamaño de la celda de cada juego. Celdas más pequeñas = más juegos en pantalla."},
 {t:"Espaciado (itemgap)",b:"El <b>hueco entre carátulas</b>. 0 = pegadas; súbelo para dar aire."},
 {t:"Visibles: X col × Y filas",b:"No es una opción, es <b>información</b>: cuántas carátulas se verán con los tamaños actuales."},
 {t:"Focus position",b:"En qué <b>posición de la fila</b> se queda el juego seleccionado. 0 = al principio; 3 = cuarta celda. Es la celda naranja de la vista previa."},
 {t:"Zoom on focus + cantidad",b:"La carátula seleccionada <b>se agranda</b>. El deslizador decide cuánto (porcentaje). 0% = nada; 20‑25% es lo típico. Activa \"foco real\" para verlo."},
 {t:"Carátula / icono",b:"Posición y tamaño de la <b>carátula dentro de su celda</b>. Sirve para centrarla o dejar sitio al título. Es independiente del título."},
 {t:"Títulos de carátula",b:"El <b>nombre del juego</b> bajo (o donde quieras) la carátula.<br><br>Hay <b>dos ajustes separados</b>:<br>• <b>Título (normal)</b>: en los juegos NO seleccionados.<br>• <b>Título (on‑focus)</b>: en el seleccionado.<br><br>Así puedes agrandarlo solo cuando está seleccionado. De cada uno: posición, tamaño, fuente, color, alineación, negrita y mayúsculas."},
 {t:"Imágenes on‑focus",b:"Imágenes que aparecen <b>solo en el juego seleccionado</b>: normalmente un marco brillante.<br><br>Las coordenadas son relativas a la celda, así que valores negativos hacen que sobresalga (normal en marcos). También se incluyen en el ZIP."},
 {t:"Texto deslizante (títulos)",b:"Si el nombre del juego es más largo que su recuadro, esta opción hace que <b>se desplace solo</b>. Puedes activarlo por <b>separado</b> para el título normal y el on-focus, y lo ves desplazarse también en la vista previa."},
 {t:"Difuminados de borde",b:"Hacen que los iconos <b>se desvanezcan poco a poco</b> al llegar a un borde de la rejilla, en vez de cortarse.<br><br>Activa los lados que quieras (<b>izquierda, derecha, arriba, abajo</b>). Para cada lado eliges el <b>grosor</b>, el <b>difuminado</b> y el <b>color</b>. La herramienta genera la imagen sola y la incluye en el paquete; también puedes <b>subir tu propia imagen</b>."},
 {t:"Navegación",b:"Qué hace la cruceta al salir de la rejilla. La herramienta lo configura según la orientación. <b>9000</b> es el menú de opciones de vista."}]},

{t:"Opciones comunes a todos los objetos",b:"",
 subs:[
 {t:"Nombre del objeto",b:"Solo una etiqueta para reconocerlo en las capas. No afecta al resultado."},
 {t:"X, Y, W, H",b:"<b>X</b> = distancia desde la izquierda. <b>Y</b> = desde arriba. <b>W</b> = ancho. <b>H</b> = alto. En píxeles, sobre 1280×720."},
 {t:"Imagen de vista previa",b:"Carga una imagen <b>solo para ver el tamaño</b>. Para el arte del juego es solo un ejemplo. Para los objetos <i>Image</i> sí es la imagen real que usarás."},
 {t:"Aspect ratio",b:"<b>stretch</b>: deforma para llenar.<br><b>keep</b>: mantiene proporciones (lo correcto para carátulas).<br><b>scale</b>: llena todo recortando lo que sobra."},
 {t:"Borde",b:"Para <b>marcos</b>: evita que las esquinas se deformen al estirar la imagen. Déjalo en 0 si no usas marcos."},
 {t:"Opacidad",b:"Cuán <b>transparente</b> es la imagen, de 0% a 100%. Útil en paneles de fondo para dejar ver el fanart."},
 {t:"Fuente",b:"El <b>tipo de letra</b>. Son las reales de XBMC4Gamers: el número es el tamaño (size_13 pequeño, size_50 enorme). No inventes nombres o el texto no se verá."},
 {t:"Color / negrita / MAYÚSCULAS",b:"Aspecto del texto. \"MAYÚSCULAS\" fuerza letras grandes."},
 {t:"Autoscroll",b:"Solo en la descripción: si el texto no cabe, <b>se desplaza solo</b> tras unos segundos."},
 {t:"Adelante / Atrás / Eliminar",b:"<b>Adelante</b> pone el objeto encima, <b>Atrás</b> lo manda detrás. Útil cuando se solapan."}]},

{t:"Capas (z‑order)",b:"La lista de objetos, de arriba abajo. Lo que está <b>más arriba</b> se dibuja <b>encima</b>.<br><br>▲▼ lo mueven, ✕ lo elimina, y al hacer clic en el nombre lo seleccionas.<br><br><b>Regla práctica</b>: fanart y paneles de fondo abajo; textos y rejilla arriba."},

{t:"Guardar el trabajo",b:"",
 subs:[
 {t:"Copiar",b:"Copia el texto del XML al portapapeles."},
 {t:".xml",b:"Descarga <b>solo el archivo XML</b>."},
 {t:"Vista previa",b:"Guarda una <b>foto</b> pequeña en JPG de tu pantalla, la que XBMC4Gamers muestra para previsualizar la vista."},
 {t:"Paquete (recomendado)",b:"Descarga <b>todo junto</b> en un ZIP. Dentro encontrarás:<br>• el <b>.xml</b> de la vista<br>• la imagen <b>.jpg</b> de vista previa<br>• una <b>carpeta</b> con tus imágenes personalizadas<br><br>Ya está organizado como espera la Xbox: copia el contenido en la carpeta <i>custom views</i> del skin."}]},

{t:"Consejos y problemas comunes",b:"",
 subs:[
 {t:"No veo el fanart",b:"Comprueba que has añadido el objeto <b>Fanart</b> y que el fanart está activo en el dashboard. Un panel de fondo opaco delante lo tapa: baja su opacidad."},
 {t:"Carátulas muy juntas o muy pocas",b:"Ajusta <b>ancho/alto de carátula</b> y el <b>espaciado (itemgap)</b>. La línea \"Visibles: X col × Y filas\" te lo dice al momento."},
 {t:"El título se solapa con la carátula",b:"Mueve el título o reduce la carátula en <b>Carátula / icono</b>. Son independientes."},
 {t:"Mis imágenes no se ven en la Xbox",b:"Deben estar en una carpeta con el <b>mismo nombre que el XML</b>, dentro de <i>custom views</i>. Descargando el <b>Paquete</b> ya queda todo bien."},
 {t:"El texto no se ve",b:"Casi siempre es una <b>fuente</b> mal escrita o un color igual al fondo. Usa solo las de la lista."}]}
]},
fr:{title:"Guide de l'Easy Custom View Creator",intro:"Ce guide explique, avec des mots simples, à quoi sert chaque option de l'outil. Pas besoin de savoir programmer : lisez seulement la partie qui vous intéresse.",
secs:[
{t:"Ce qu'est cet outil",b:"Il permet de <b>créer un écran personnalisé</b> (une <i>custom view</i>) pour XBMC4Gamers : la façon dont vos jeux s'affichent sur l'écran de la Xbox.<br><br>Vous le construisez en glissant des éléments à la souris, et l'outil écrit le fichier XML à votre place. Aucun code requis.",
 subs:[
 {t:"Les trois zones",b:"<b>À gauche</b> : les objets à ajouter et la liste des calques.<br><b>Au centre</b> : l'aperçu, c'est‑à‑dire le rendu réel de l'écran (1280×720).<br><b>À droite</b> : les options de l'objet sélectionné et le XML généré."},
 {t:"Comment travailler",b:"1) Cliquez sur un objet dans la palette.<br>2) Glissez‑le dans l'aperçu pour le déplacer.<br>3) Tirez les coins pour le redimensionner.<br>4) Réglez les détails à droite.<br>5) Cliquez sur <b>Paquet</b> pour tout télécharger."}]},
{t:"La barre du haut",b:"Réglages généraux de l'écran que vous créez.",
 subs:[
 {t:"View ID",b:"Le <b>numéro d'identification</b> de votre écran (80 à 99). Chaque custom view doit avoir un numéro différent. Il apparaît dans le nom du fichier (ex. <i>CustomViewtype_id_85.xml</i>) et à l'intérieur. En cas de doute, laissez 85."},
 {t:"scroll‑fade",b:"Quand c'est activé, tout le reste <b>s'estompe légèrement</b> pendant que la liste défile. Purement esthétique."},
 {t:"focus réel",b:"Normalement toutes les jaquettes sont affichées en état « non sélectionné ». En l'activant, <b>seule</b> la jaquette à la Focus position passe en état sélectionné : elle s'agrandit et montre son cadre et son titre au focus."},
 {t:"grille",b:"Affiche un <b>quadrillage</b> pour aligner à l'œil. N'apparaît jamais dans le fichier."},
 {t:"snap 5px",b:"Les objets se déplacent par pas de 5 pixels. Désactivez‑le pour un placement au pixel près."},
 {t:"Langue et Wiki",b:"Le menu déroulant change la langue de tout l'outil. Le bouton Wiki ouvre ce guide."},
 {t:"Enregistrer / Charger",b:"<b>Enregistrer</b> crée un fichier de projet (.json) avec tout votre travail pour continuer plus tard. <b>Charger</b> le rouvre. Ce fichier ne va PAS sur la Xbox."}]},
{t:"Les objets à ajouter",b:"Ce sont les pièces de l'écran. Chacun apparaît dans l'aperçu avec une image d'exemple portant la mention SAMPLE, pour montrer la place occupée. Les images d'exemple sont pour vous seul : elles ne finissent jamais dans le fichier final.",
 subs:[
 {t:"Game List (la grille)",b:"L'objet <b>le plus important</b> : la liste des jaquettes. Vous choisissez leur taille, combien sont visibles, comment elles défilent et ce qui arrive à celle sélectionnée."},
 {t:"Fanart",b:"Le <b>fond plein écran</b> du jeu sélectionné. Il est spécial : il ne se déplace ni se redimensionne.<br><br>Il utilise le fanart officiel, donc il <b>obéit aux options</b> du dashboard (retirer, animer, flouter…). Si vous le retirez, ces options n'agissent plus sur votre vue."},
 {t:"Image / Panel (vos images)",b:"Pour <b>vos propres images</b> : panneaux, fonds, cadres, décorations.<br><br>Quand vous chargez un fichier, son nom devient le nom de l'objet et le chemin dans le XML. Ces images sont aussi enregistrées dans le paquet ZIP."},
 {t:"Artwork du jeu",b:"Images <b>fournies par le jeu</b>, donc elles changent d'un jeu à l'autre. Vous choisissez seulement l'emplacement et la taille : <b>Poster</b> (jaquette), <b>CD</b> (disque), <b>CD Poster</b>, <b>Open Case</b>, <b>Icon</b>, <b>Banner</b>, <b>Thumb</b>, <b>Synopsis</b>, <b>Dual3D</b>, <b>Fanart Thumb</b>, <b>Screenshot</b>.<br><br>Vous ne les chargez pas : le jeu les fournit depuis son dossier <i>_resources</i>."},
 {t:"Icônes et Textes synopsis",b:"Les <b>infos de la fiche</b> du jeu : année, genre, note, nombre de joueurs, ESRB, etc. La version <b>icône</b> affiche le pictogramme (avec éventuellement la valeur à côté) ; la version <b>texte</b> affiche seulement la valeur, pour la placer où vous voulez et ajouter l'icône à part."},
 {t:"Description",b:"Le cadre avec le <b>résumé du jeu</b>. Vous pouvez taper ou coller un texte d'exemple pour vérifier ce qui rentre. Dans le fichier final le texte vient automatiquement du jeu."},
 {t:"Label",b:"Un texte libre. Soit <b>fixe</b> (ex. « MES JEUX »), soit une <b>valeur variable</b> du jeu sélectionné."},
 {t:"Items counter",b:"Affiche <b>combien de jeux</b> contient le dossier courant (ex. « 120 Items »). Le mot « Items » peut être changé ou retiré."}]},
{t:"Les options de la Game List",b:"Ces sections apparaissent quand vous sélectionnez la grille.",
 subs:[
 {t:"Comportement de la grille",b:"Décide <b>qui bouge</b> au défilement.<br><br><b>Navigation libre</b> : vous vous déplacez, la jaquette surlignée prend le focus, la grille reste fixe.<br><b>Focus fixe</b> : la sélection reste à la position choisie et ce sont les jaquettes qui défilent, comme dans la vue par défaut de XBMC4Gamers.<br><br>L'outil choisit tout seul le bon conteneur (panel ou fixedlist)."},
 {t:"Type de liste",b:"<b>panel</b> : les jaquettes remplissent l'espace sur plusieurs rangées (le plus courant).<br><b>list</b> : une seule rangée.<br><b>wraplist</b> : carrousel continu."},
 {t:"Orientation",b:"Le sens de <b>défilement</b>.<br><br><b>horizontal</b> : gauche/droite. Pour quitter la grille et ouvrir les <b>options d'affichage</b> on appuie sur <b>HAUT</b>.<br><b>vertical</b> : haut/bas. Les options s'ouvrent alors avec <b>GAUCHE</b>.<br><br>L'outil règle ce raccourci automatiquement."},
 {t:"Largeur / hauteur de jaquette",b:"La taille de la case de chaque jeu. Plus petit = plus de jeux à l'écran."},
 {t:"Espacement (itemgap)",b:"Le <b>vide entre les jaquettes</b>. 0 = collées ; augmentez pour aérer."},
 {t:"Visibles : X col × Y lignes",b:"Ce n'est pas une option, c'est une <b>information</b> : combien de jaquettes seront visibles avec vos tailles."},
 {t:"Focus position",b:"À quelle <b>place de la rangée</b> se trouve le jeu sélectionné. C'est la case surlignée en orange dans l'aperçu."},
 {t:"Zoom au focus",b:"La jaquette sélectionnée <b>grossit</b>. Le curseur règle de combien (en %). Activez « focus réel » pour le voir dans l'aperçu."},
 {t:"Jaquette / icône",b:"Position et taille de la <b>jaquette dans sa case</b>. Indépendante du titre."},
 {t:"Titres des jaquettes",b:"Le <b>nom du jeu</b>. Deux réglages séparés : <b>normal</b> (jeux non sélectionnés) et <b>au focus</b> (jeu sélectionné). Pour chacun : position, taille, police, couleur, alignement, gras, majuscules."},
 {t:"Texte défilant",b:"Si le nom dépasse son cadre, il <b>défile tout seul</b>. Activable <b>séparément</b> pour le titre normal et celui au focus ; visible aussi dans l'aperçu."},
 {t:"Dégradés de bord",b:"Font <b>disparaître progressivement</b> les icônes aux bords de la grille. Activez les côtés voulus (<b>gauche, droite, haut, bas</b>) et réglez pour chacun l'<b>épaisseur</b>, le <b>dégradé</b> et la <b>couleur</b>. L'outil génère l'image et l'ajoute au paquet ; vous pouvez aussi charger la vôtre."},
 {t:"Images au focus",b:"Images affichées <b>seulement sur le jeu sélectionné</b> (ex. cadre brillant). Coordonnées relatives à la case ; des valeurs négatives la font dépasser. Incluses dans le ZIP."},
 {t:"Navigation",b:"Ce que font les flèches quand vous quittez la grille. Réglé automatiquement selon l'orientation. <b>9000</b> est le menu des options d'affichage."}]},
{t:"Les options communes à tous les objets",b:"",
 subs:[
 {t:"Nom de l'objet",b:"Juste une étiquette pour le reconnaître dans les calques. Sans effet sur le rendu."},
 {t:"X, Y, L, H",b:"<b>X</b> = distance depuis la gauche. <b>Y</b> = depuis le haut. <b>L</b> = largeur. <b>H</b> = hauteur. En pixels, sur 1280×720."},
 {t:"Image d'aperçu",b:"Chargez une image <b>juste pour voir l'encombrement</b>. Pour l'artwork c'est un exemple ; pour les objets <i>Image</i> c'est la vraie image utilisée."},
 {t:"Aspect ratio",b:"<b>stretch</b> : déforme pour remplir.<br><b>keep</b> : garde les proportions (bon pour les jaquettes).<br><b>scale</b> : remplit en rognant."},
 {t:"Bordure",b:"Pour les <b>cadres</b> : empêche la déformation des coins à l'agrandissement. Laissez 0 sinon."},
 {t:"Opacité",b:"À quel point l'image est <b>transparente</b>, de 0 % à 100 %. Utile pour les panneaux de fond."},
 {t:"Police",b:"La <b>fonte</b> du texte. Ce sont les vraies fontes de XBMC4Gamers : le numéro est la taille. N'inventez pas de noms."},
 {t:"Couleur / gras / MAJUSCULES",b:"Apparence du texte. « MAJUSCULES » force les capitales."},
 {t:"Autoscroll",b:"Pour la description : si le texte dépasse, il <b>défile tout seul</b> après quelques secondes."},
 {t:"Avancer / Reculer / Supprimer",b:"<b>Avancer</b> met l'objet au‑dessus, <b>Reculer</b> le met derrière. Utile quand des objets se chevauchent."}]},
{t:"Calques (z‑order)",b:"La liste des objets, de haut en bas. Ce qui est <b>plus haut</b> est dessiné <b>au‑dessus</b>.<br><br>▲▼ déplacent, ✕ supprime, un clic sur le nom sélectionne.<br><br><b>Règle</b> : fanart et fonds en bas, textes et grille au‑dessus."},
{t:"Enregistrer votre travail",b:"",
 subs:[
 {t:"Copier",b:"Copie le texte du XML dans le presse‑papiers."},
 {t:".xml",b:"Télécharge <b>seulement le fichier XML</b>."},
 {t:"Aperçu",b:"Enregistre une petite <b>photo</b> JPG de votre écran, celle que XBMC4Gamers montre pour prévisualiser la vue."},
 {t:"Paquet (recommandé)",b:"Télécharge <b>tout</b> dans un ZIP : le <b>.xml</b>, l'<b>.jpg</b> d'aperçu et un <b>dossier</b> avec vos images, déjà rangés comme la Xbox l'attend (dans <i>custom views/_global/</i>)."}]},
{t:"Astuces et problèmes courants",b:"",
 subs:[
 {t:"Je ne vois pas le fanart",b:"Vérifiez d'avoir ajouté l'objet <b>Fanart</b> et que le fanart est activé dans le dashboard. Un panneau opaque devant le cache : baissez son opacité."},
 {t:"Jaquettes trop serrées / trop peu",b:"Réglez <b>largeur/hauteur</b> et l'<b>espacement (itemgap)</b>. La ligne « Visibles » montre le résultat aussitôt."},
 {t:"Le titre chevauche la jaquette",b:"Déplacez le titre ou réduisez la jaquette dans <b>Jaquette / icône</b>. Ils sont indépendants."},
 {t:"Mes images n'apparaissent pas sur la Xbox",b:"Elles doivent être dans <i>custom views/_global/CustomViewtype_id_XX/</i>. Le <b>Paquet</b> range déjà tout correctement."},
 {t:"Le texte est invisible",b:"Presque toujours une <b>police</b> mal écrite ou une couleur identique au fond. Utilisez seulement les fontes de la liste."}]}
]},
de:{title:"Anleitung zum Easy Custom View Creator",intro:"Diese Anleitung erklärt mit einfachen Worten, wozu jede Option dient. Programmierkenntnisse sind nicht nötig: Lies einfach den Teil, der dich interessiert.",
secs:[
{t:"Was dieses Tool ist",b:"Damit <b>erstellst du einen eigenen Bildschirm</b> (eine <i>custom view</i>) für XBMC4Gamers: die Art, wie deine Spiele auf dem Xbox‑Bildschirm aussehen.<br><br>Du baust ihn per Maus zusammen, und das Tool schreibt die XML‑Datei für dich. Kein Code nötig.",
 subs:[
 {t:"Die drei Bereiche",b:"<b>Links</b>: Objekte zum Hinzufügen und die Ebenenliste.<br><b>Mitte</b>: die Vorschau, also das echte Aussehen (1280×720).<br><b>Rechts</b>: Optionen des gewählten Objekts und das erzeugte XML."},

{t:"Ebenen (z‑order)",b:"Die Liste der Objekte, von oben nach unten. Was <b>weiter oben</b> steht, wird <b>darüber</b> gezeichnet.<br><br>▲▼ verschieben, ✕ löscht, ein Klick auf den Namen wählt aus.<br><br><b>Faustregel</b>: Fanart und Hintergründe unten, Texte und Raster oben."},

   s.subs.forEach((u,j)=>{const uid2=id+'_'+j;
    toc+=`<li><a href="#${uid2}">${i+1}.${j+1} ${u.t}</a></li>`;
    body+=`<h3 id="${uid2}">${i+1}.${j+1} ${u.t}</h3><p>${u.b}</p>`;});
   toc+='</ol>';}
  toc+='</li>';});
 const doc=`<!doctype html><html lang="${lang}"><head><meta charset="utf-8"><title>${W.title} · XBMC4Gamers View Builder</title>
 <style>

async function unzip(file){
 const b=new Uint8Array(await file.arrayBuffer());const dv=new DataView(b.buffer);
 // trova EOCD
 let eo=-1;for(let i=b.length-22;i>=0&&i>b.length-65558;i--){if(dv.getUint32(i,true)===0x06054b50){eo=i;break;}}
 if(eo<0)throw new Error('EOCD');
 const n=dv.getUint16(eo+10,true);let off=dv.getUint32(eo+16,true);
 const out=[];
 for(let k=0;k<n;k++){
  if(dv.getUint32(off,true)!==0x02014b50)break;
  const method=dv.getUint16(off+10,true), csize=dv.getUint32(off+20,true);
  const nlen=dv.getUint16(off+28,true), elen=dv.getUint16(off+30,true), clen=dv.getUint16(off+32,true);
  const lho=dv.getUint32(off+42,true);
  const name=new TextDecoder().decode(b.slice(off+46,off+46+nlen));
  // local header -> dati
  const lnlen=dv.getUint16(lho+26,true), lelen=dv.getUint16(lho+28,true);
  const ds=lho+30+lnlen+lelen;
  let data=b.slice(ds,ds+csize);
  if(method===8){
   const st=new Blob([data]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
   data=new Uint8Array(await new Response(st).arrayBuffer());
  } else if(method!==0) throw new Error('compressione non supportata');
  if(!name.endsWith('/'))out.push({name,data});
  off+=46+nlen+elen+clen;
 }
 return out;
}
function u8ToDataURL(u8,name){
 const ext=(name.split('.').pop()||'').toLowerCase();
 const mime=ext==='png'?'image/png':ext==='gif'?'image/gif':'image/jpeg';
 let bin='';const CH=0x8000;
 for(let i=0;i<u8.length;i+=CH)bin+=String.fromCharCode.apply(null,u8.subarray(i,i+CH));
 return 'data:'+mime+';base64,'+btoa(bin);
}
const gx=(el,tag,dflt)=>{const c=el.querySelector(':scope > '+tag);return c?c.textContent.trim():dflt;};
const gnum=(el,tag,dflt)=>{const v=gx(el,tag,null);const n=parseFloat(v);return isNaN(n)?dflt:n;};
function colFromHex(h){if(!h)return '#ffffff';h=h.trim();if(/^[0-9a-f]{8}$/i.test(h))return '#'+h.slice(2).toLowerCase();
 if(/^[0-9a-f]{6}$/i.test(h))return '#'+h.toLowerCase();return '#ffffff';}
function stripTags(l){return (l||'').replace(/\[\/?B\]/gi,'').replace(/\[\/?UPPERCASE\]/gi,'').trim();}

function hasU(l){return /\[UPPERCASE\]/i.test(l||'');}

function texType(tex){
 const x=(tex||'').toLowerCase();
 if(x.includes('listitem.icon'))return 'poster';
 if(x.includes('_resources\\screenshots')||x.includes('screenshot-'))return 'screenshot';
 const m=x.match(/_resources\\artwork\\([a-z0-9_]+)\./);
 if(m){const k=m[1];const map={cd:'cd',cdposter:'cdposter',opencase:'opencase',icon:'icon',banner:'banner',thumb:'thumb',synopsis:'synopsis',dual3d:'dual3d',fanart_thumb:'fanart_thumb',poster:'poster'};if(map[k])return map[k];}
 const si=x.match(/synopsis icons[\\\/]([a-z_0-9]+)\.png/);
 if(si){for(const [k,v] of Object.entries(SICONS)){if(v.tex.toLowerCase().includes(si[1]))return k;}}

function parseLayout(lay,e,foc){
 if(!lay)return;
 const imgs=[...lay.querySelectorAll('control[type="image"]')];
 const labs=[...lay.querySelectorAll('control[type="label"]')];
 const posterEl=imgs.find(c=>(gx(c,'texture','')||'').toLowerCase().includes('listitem.icon'));
 if(posterEl){
  const pr={x:gnum(posterEl,'posx',5),y:gnum(posterEl,'posy',5),w:gnum(posterEl,'width',e.itemW-10),h:gnum(posterEl,'height',e.itemH-40)};
  if(!foc)e.poster=pr;
  const an=[...posterEl.querySelectorAll('animation')].find(a=>a.textContent.trim().toLowerCase()==='focus'&&a.getAttribute('effect')==='zoom');
  if(an&&foc){const en=(an.getAttribute('end')||'').split(',').map(Number);
   if(en.length===4&&pr.w>0){const z=Math.round((en[2]-pr.w)/pr.w*100);e.zoom=z>0;e.zoomAmount=Math.max(0,Math.min(60,z));}}
 }
 const lab=labs.find(c=>/listitem\.label/i.test(gx(c,'label','')));
 if(lab){const raw=gx(lab,'label','');
  const T={x:gnum(lab,'posx',0),y:gnum(lab,'posy',180),w:gnum(lab,'width',148),h:gnum(lab,'height',38),
   font:gx(lab,'font','size_15'),color:colFromHex(gx(lab,'textcolor','FFFFFFFF')),align:gx(lab,'align','center'),
   bold:hasB(raw),upper:hasU(raw)};
  if(foc)e.tf=T;else e.ti=T;}
 if(foc){e.foc=[];imgs.forEach(c=>{if(c===posterEl)return;
   const tex=gx(c,'texture','');const tn=c.querySelector(':scope > texture');
   e.foc.push({id:uid++,texture:fileOfCustom(tex)||tex,file:fileOfCustom(tex),
    x:gnum(c,'posx',0),y:gnum(c,'posy',0),w:gnum(c,'width',100),h:gnum(c,'height',100),
    border:tn?parseInt(tn.getAttribute('border')||0)||0:0,aspect:gx(c,'aspectratio','stretch'),previewSrc:null});});}
}

 const arr=[];uid=1;
 // fanart
 if([...doc.querySelectorAll('include')].some(i=>!i.getAttribute('name')&&/^fanart/i.test(i.textContent.trim())))
  arr.push(defFor('fanart'));
 const fade=!!doc.querySelector('animation[condition*="OnScrollNext"]');
 const seen=new Set();
 doc.querySelectorAll('control').forEach(c=>{

   const il=c.querySelector(':scope > itemlayout'),fl=c.querySelector(':scope > focusedlayout');
   if(il){e.itemW=parseInt(il.getAttribute('width'))||e.itemW;e.itemH=parseInt(il.getAttribute('height'))||e.itemH;}
   e.title=false;parseLayout(il,e,false);parseLayout(fl,e,true);
   e.title=!!(e.ti&&e.tf)||!!e.ti;
   if(!e.tf)e.tf=JSON.parse(JSON.stringify(e.ti||{x:0,y:180,w:148,h:38,font:'size_16',color:'#ffffff',align:'center',bold:false,upper:true}));
   if(!e.ti)e.ti={x:0,y:180,w:148,h:38,font:'size_15',color:'#ffffff',align:'center',bold:false,upper:true};

  }

         if(file&&imgMap[file.toLowerCase()])e.previewSrc=imgMap[file.toLowerCase()];else e.previewSrc=null;}
   e.x=gnum(c,'posx',0);e.y=gnum(c,'posy',0);e.w=gnum(c,'width',100);e.h=gnum(c,'height',100);
   e.aspect=gx(c,'aspectratio','stretch');
   const tn=c.querySelector(':scope > texture');e.border=tn?(parseInt(tn.getAttribute('border')||0)||0):0;
   const cd=gx(c,'colordiffuse','');if(/^[0-9a-f]{8}$/i.test(cd))e.alpha=Math.round(parseInt(cd.slice(0,2),16)/255*100);
   if(tt&&!SICONS[tt]&&tt!=='poster')e.texture=tex;
   arr.push(e);return;
  }
  if(ty==='textbox'){
   const lb=gx(c,'label','');if(!/synopsis_overview/i.test(lb))return;
   const e=defFor('description');
   e.x=gnum(c,'posx',0);e.y=gnum(c,'posy',0);e.w=gnum(c,'width',290);e.h=gnum(c,'height',230);
   e.font=gx(c,'font','size_18');e.color=colFromHex(gx(c,'textcolor','FFFFFFFF'));
   e.align=gx(c,'align','left');e.aligny=gx(c,'aligny','top');
   e.bold=hasB(lb);e.upper=hasU(lb);e.autoscroll=!!c.querySelector(':scope > autoscroll');
   arr.push(e);return;
  }
  if(ty==='label'){
   const lb=gx(c,'label','');const inf=infoOf(lb);
   if(/listitem\.label/i.test(lb))return; // titoli gestiti nei layout
   let e;
   if(inf&&/container\.numitems/i.test(inf)){e=defFor('itemcounter');
    e.suffix=stripTags(lb).replace(/\$INFO\[[^\]]+\]/i,'');}
   else if(inf&&Object.values(SVALS).some(v=>v.info.toLowerCase()===inf.toLowerCase())){
    const key=Object.keys(SVALS).find(k=>SVALS[k].info.toLowerCase()===inf.toLowerCase());e=defFor(key);e.info=inf;}
   else {e=defFor('label');if(inf){e.mode='info';e.info=inf;}else{e.mode='static';e.text=stripTags(lb);}}
   e.x=gnum(c,'posx',0);e.y=gnum(c,'posy',0);e.w=gnum(c,'width',200);e.h=gnum(c,'height',40);
   e.font=gx(c,'font','size_16');e.color=colFromHex(gx(c,'textcolor','FFFFFFFF'));
   e.align=gx(c,'align','center');e.bold=hasB(lb);e.upper=hasU(lb);
   arr.push(e);return;
  }
 });
 return {arr,vid,fade};
}
async function importFile(file){
 let xmlText=null;const imgMap={};let baseName=file.name.replace(/\.(zip|xml)$/i,'');
 if(/\.zip$/i.test(file.name)){
  const entries=await unzip(file);
  const xe=entries.find(e=>/\.xml$/i.test(e.name));
  if(!xe)throw new Error('NOXML');
  xmlText=new TextDecoder().decode(xe.data);
  baseName=xe.name.split('/').pop().replace(/\.xml$/i,'');
  entries.filter(e=>/\.(png|jpg|jpeg|gif)$/i.test(e.name)).forEach(e=>{
   const n=e.name.split('/').pop();
   if(n.toLowerCase()===baseName.toLowerCase()+'.jpg')return; // e' l'anteprima
   imgMap[n.toLowerCase()]=u8ToDataURL(e.data,n);});
 } else {
  xmlText=await file.text();
 }
 const {arr,vid,fade}=xmlToEls(xmlText,imgMap);
 // overlay on-focus: aggancio le immagini della cartella
 arr.forEach(e=>{(e.foc||[]).forEach(o=>{if(o.file&&imgMap[o.file.toLowerCase()])o.previewSrc=imgMap[o.file.toLowerCase()];});});
 els=arr;
 const idm=(vid)||(baseName.match(/(\d+)$/)||[])[1];
 if(idm)q('#viewId').value=idm;
 q('#optFanartFade').checked=!!fade;
 uid=Math.max(1,...els.map(e=>e.id),...els.flatMap(e=>(e.foc||[]).map(o=>o.id)))+1;
 sel=null;render();
 return baseName;
}
q('#impBtn').onclick=()=>{q('#impFile').value='';q('#impFile').click();};
q('#impFile').addEventListener('change',async ev=>{const f=ev.target.files[0];if(!f)return;
 try{const n=await importFile(f);toast(t('t_imp_ok')+' '+n);}
 catch(err){toast(err.message==='NOXML'?t('t_imp_noxml'):t('t_imp_err'));console.error(err);}});

els=[defFor('fanart'),defFor('list'),Object.assign(defFor('itemcounter'),{x:530,y:635,w:220,h:40,font:'size_18',align:'center',bold:true,upper:true,suffix:' Items'})];
uid=Math.max(...els.map(e=>e.id))+1;sel=(els.find(e=>e.type==='list')||{}).id||null;render();
